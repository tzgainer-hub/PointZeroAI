<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <rect width="100" height="100" rx="12" fill="#0c1e3c"/>
  <g transform="translate(50,50)">
    <!-- Outer ring -->
    <circle cx="0" cy="0" r="38" stroke="#c9a447" stroke-opacity="0.5" stroke-width="1.5" fill="none"/>
    <!-- Cardinal arms -->
    <path d="M0,-43 L-6,0 L0,-6 L6,0 Z" fill="white"/>
    <path d="M0,43 L6,0 L0,6 L-6,0 Z" fill="white"/>
    <path d="M43,0 L0,-6 L6,0 L0,6 Z" fill="white"/>
    <path d="M-43,0 L0,6 L-6,0 L0,-6 Z" fill="white"/>
    <!-- Diagonal arms -->
    <path d="M28,-28 L-3,-3 L6,-6 L3,3 Z" fill="white" fill-opacity="0.4"/>
    <path d="M-28,28 L3,3 L-6,6 L-3,-3 Z" fill="white" fill-opacity="0.4"/>
    <path d="M28,28 L3,-3 L6,6 L-3,3 Z" fill="white" fill-opacity="0.4"/>
    <path d="M-28,-28 L-3,3 L-6,-6 L3,-3 Z" fill="white" fill-opacity="0.4"/>
    <!-- Center dot -->
    <circle cx="0" cy="0" r="2.5" fill="#c9a447"/>
  </g>
</svg>
