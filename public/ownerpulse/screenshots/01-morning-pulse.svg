  <rect x="30" y="700" width="330" height="56" rx="12" fill="#c9a447"/>
  <text x="195" y="734" font-family="Inter, sans-serif" font-size="14" fill="#0c1e3c" font-weight="700" text-anchor="middle" letter-spacing="1.5">SAVE MORNING PULSE</text>
