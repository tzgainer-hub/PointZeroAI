    <text x="50" y="438" font-size="12" fill="rgba(255,255,255,0.55)">1 reach-back today</text>

    <rect x="30" y="474" width="330" height="78" rx="14" fill="#102b54" stroke="rgba(255,255,255,0.06)"/>
    <text x="50" y="504" font-weight="600">Review requests</text>
    <text x="50" y="526" font-size="12" fill="rgba(255,255,255,0.55)">Ask 2 happy clients</text>

    <rect x="30" y="562" width="330" height="78" rx="14" fill="#102b54" stroke="rgba(255,255,255,0.06)"/>
